services:
  app:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:
